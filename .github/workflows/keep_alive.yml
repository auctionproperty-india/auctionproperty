name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # हर 5 मिनट में Run होगा

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Live URL
        run: curl -s -o /dev/null https://auctionprimeproperty.onrender.com

      - name: Ping Test URL
        run: curl -s -o /dev/null https://auctionproperty-1.onrender.com
